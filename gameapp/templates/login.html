{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Access | Login | Dark Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
    <link rel="stylesheet" href="{% static 'css/cookie-banner.css' %}">
    <style>
        /* Login Specific Styles */
        .login-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        /* Matrix-like data stream background */
        .data-stream {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            background: linear-gradient(rgba(255, 179, 0, 0.1) 2px, transparent 2px),
                        linear-gradient(90deg, rgba(255, 179, 0, 0.1) 2px, transparent 2px);
            background-size: 50px 50px;
            animation: moveStream 20s linear infinite;
        }

        @keyframes moveStream {
            from { transform: translateY(0); }
            to { transform: translateY(50px); }
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(25px);
            padding: 50px;
            border-radius: 24px;
            border: 1px solid rgba(255, 179, 0, 0.1);
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo i {
            font-size: 48px;
            color: var(--primary-color);
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .auth-tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            padding-bottom: 8px;
            transition: var(--transition-smooth);
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary-color);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
        }

        .auth-input-group {
            margin-bottom: 25px;
        }

        .auth-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #222;
            padding: 15px 20px;
            color: #fff;
            border-radius: 8px;
            outline: none;
            transition: var(--transition-smooth);
            font-size: 14px;
        }

        .auth-input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 179, 0, 0.05);
            box-shadow: 0 0 15px rgba(255, 179, 0, 0.1);
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary-color);
            box-shadow: 0 0 25px var(--primary-color), 0 0 50px var(--primary-color);
            display: none;
            z-index: 9999;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .back-home {
            position: absolute;
            top: 40px;
            left: 8%;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s ease;
        }

        .back-home:hover {
            color: var(--primary-color);
        }

        .error-message {
            background: rgba(230, 57, 70, 0.1);
            color: #e63946;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(230, 57, 70, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; border-radius: 0; height: 100%; max-width: 100%; }
            .back-home { top: 20px; left: 20px; }
        }
    </style>
</head>
<body class="page-reveal">

    <div class="login-wrapper">
        <div class="data-stream"></div>
        <div class="scan-line" id="scanLine"></div>

        <a href="{% url 'index' %}" class="back-home">
            <i class="fa fa-chevron-left"></i> RETURN TO HOME
        </a>

        <div class="auth-card">
            <div class="auth-logo">
                <i class="fa fa-shield"></i>
                <h2 style="margin-top: 15px; font-size: 20px; letter-spacing: 4px;">NEURAL <span style="color: var(--primary-color);">ACCESS</span></h2>
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fa fa-warning"></i> {{ error }}
            </div>
            {% endif %}

            <div class="auth-tabs">
                <button class="tab-btn active" id="loginTab" onclick="toggleAuth('login')">Login</button>
                <button class="tab-btn" id="registerTab" onclick="toggleAuth('register')">Sign Up</button>
            </div>

            <form id="authForm" method="POST">
                {% csrf_token %}
                <input type="hidden" name="auth_type" id="authType" value="login">

                <div class="auth-input-group">
                    <input type="text" name="username" class="auth-input" placeholder="NEURAL ID / USERNAME" required>
                </div>
                
                <div class="auth-input-group" id="emailGroup" style="display: none;">
                    <input type="email" name="email" id="emailInput" class="auth-input" placeholder="NEURAL LINK (EMAIL)">
                </div>

                <div class="auth-input-group">
                    <input type="password" name="password" class="auth-input" placeholder="ACCESS KEY (PASSWORD)" required>
                </div>

                <button class="submit-btn" type="submit" id="submitBtn">IDENTIFY</button>
            </form>

            <div style="margin-top: 30px; text-align: center;">
                <p style="font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 1px;">Secure Connection Encrypted (AES-256)</p>
                <div style="display: flex; justify-content: center; gap: 20px; margin-top: 15px; color: #555;">
                    <i class="fa fa-discord" style="cursor: pointer;"></i>
                    <i class="fa fa-steam" style="cursor: pointer;"></i>
                    <i class="fa fa-twitch" style="cursor: pointer;"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleAuth(type) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const emailGroup = document.getElementById('emailGroup');
            const emailInput = document.getElementById('emailInput');
            const submitBtn = document.getElementById('submitBtn');
            const authTypeInput = document.getElementById('authType');

            loginTab.classList.remove('active');
            registerTab.classList.remove('active');

            if (type === 'login') {
                loginTab.classList.add('active');
                emailGroup.style.display = 'none';
                emailInput.required = false;
                submitBtn.innerText = 'IDENTIFY';
                authTypeInput.value = 'login';
            } else {
                registerTab.classList.add('active');
                emailGroup.style.display = 'block';
                emailInput.required = true;
                submitBtn.innerText = 'CREATE LINK';
                authTypeInput.value = 'register';
            }
        }

        // Biometric Scan Simulation then Submit
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const form = this;
            const scanLine = document.getElementById('scanLine');
            const btn = document.getElementById('submitBtn');
            
            scanLine.style.display = 'block';
            btn.innerText = 'SCANNING...';
            btn.disabled = true;

            // Move the scan line simulation
            let pos = 0;
            const interval = setInterval(() => {
                if (pos >= window.innerHeight) {
                    clearInterval(interval);
                    scanLine.style.display = 'none';
                    btn.innerText = 'AUTHENTICATING...';
                    btn.style.background = '#ffb300';
                    btn.style.color = '#000';
                    setTimeout(() => {
                        form.submit(); // Real submission to Django backend
                    }, 500);
                } else {
                    pos += 40; // Sped up the scan for better UX
                    scanLine.style.top = pos + 'px';
                }
            }, 30);
        });
    </script>
    <script src="{% static 'js/cookie-banner.js' %}"></script>
</body>
</html>
